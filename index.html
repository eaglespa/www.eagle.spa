<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Eagle Spa</title>
</head>
<body>
    <header>
        <div class="hero">
            <h1>Welcome to Eagle Spa</h1>
            <p>Your relaxation starts here</p>
        </div>
    </header>
    <section class="services">
        <h2>Our Services</h2>
        <ul>
            <li>Massage Therapy</li>
            <li>Facials</li>
            <li>Body Treatments</li>
            <li>Wellness Programs</li>
        </ul>
    </section>
    <section class="gallery">
        <h2>Gallery</h2>
        <img src="data:image/jpeg;base64,...your_base64_image..." alt="Spa Image 1">
        <img src="data:image/jpeg;base64,...your_base64_image..." alt="Spa Image 2">
        <img src="data:image/jpeg;base64,...your_base64_image..." alt="Spa Image 3">
    </section>
    <section class="testimonials">
        <h2>Testimonials</h2>
        <p>"The best spa experience ever!" - Customer</p>
    </section>
    <section class="contact">
        <h2>Contact Us</h2>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <input type="submit" value="Submit">
        </form>
    </section>
    <script src="script.js"></script>
</body>
</html>
